# Local Typesense (API key must match TYPESENSE_API_KEY in .env)
services:
  typesense:
    image: typesense/typesense:26.0
    restart: unless-stopped
    ports:
      - "8108:8108"
    volumes:
      - typesense-data:/data
    # Keep in sync with TYPESENSE_API_KEY in .env (default devtypesense)
    command: >
      --data-dir /data
      --api-key devtypesense
      --listen-port 8108
      --enable-cors

volumes:
  typesense-data:
