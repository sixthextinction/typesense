<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SERP → Typesense demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;1,9..40,400&family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a222c;
      --border: #2d3848;
      --text: #e8eef4;
      --muted: #8b9aab;
      --accent: #3ecf8e;
      --accent-dim: #2a9d66;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "DM Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(62, 207, 142, 0.12), transparent),
        radial-gradient(ellipse 60% 40% at 100% 50%, rgba(45, 56, 72, 0.4), transparent);
    }
    .wrap { max-width: 720px; margin: 0 auto; padding: 2.5rem 1.25rem 4rem; }
    h1 {
      font-family: Fraunces, Georgia, serif;
      font-weight: 600;
      font-size: 1.75rem;
      letter-spacing: -0.02em;
      margin: 0 0 0.35rem;
    }
    .sub { color: var(--muted); font-size: 0.95rem; margin-bottom: 1.75rem; line-height: 1.5; }
    form { display: flex; gap: 0.5rem; margin-bottom: 1.25rem; }
    input[type="search"] {
      flex: 1;
      padding: 0.65rem 1rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 1rem;
      outline: none;
    }
    input[type="search"]:focus {
      border-color: var(--accent-dim);
      box-shadow: 0 0 0 3px rgba(62, 207, 142, 0.15);
    }
    button {
      padding: 0.65rem 1.1rem;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: #06281a;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.95rem;
    }
    button:hover { filter: brightness(1.08); }
    .facets { margin-bottom: 1.25rem; }
    .facet-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.65rem;
    }
    .facet-row:last-child { margin-bottom: 0; }
    .facet-row > span { color: var(--muted); font-size: 0.8rem; flex: 0 0 auto; min-width: 6.5rem; }
    .chip {
      font-size: 0.8rem;
      padding: 0.35rem 0.65rem;
      border-radius: 999px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
    }
    .chip:hover { border-color: var(--accent-dim); color: var(--text); }
    .chip.active { border-color: var(--accent); color: var(--accent); }
    .meta { color: var(--muted); font-size: 0.85rem; margin-bottom: 1rem; }
    .hit {
      padding: 1rem 0;
      border-bottom: 1px solid var(--border);
    }
    .hit:last-child { border-bottom: none; }
    .hit a {
      color: #7dd3fc;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.05rem;
    }
    .hit a:hover { text-decoration: underline; }
    .hit .snippet { margin: 0.4rem 0 0; color: var(--muted); font-size: 0.9rem; line-height: 1.45; }
    .hit .tags { margin-top: 0.5rem; font-size: 0.75rem; color: var(--muted); }
    .err { color: #f87171; }
    /* Guided empty state: explains zero hits and points back to facets / broader query */
    .empty {
      padding: 1.25rem 1rem;
      border-radius: 12px;
      border: 1px dashed var(--border);
      background: rgba(26, 34, 44, 0.6);
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.55;
    }
    .empty strong { color: var(--text); }
    .empty .hint { margin-top: 0.75rem; font-size: 0.88rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Research corpus search</h1>
    <p class="sub">Compare and filter what you collected — not just keyword hits. Search ranks title &gt; snippet &gt; URL/domain; facets show which seed query and domain each row came from. Run <code style="background:var(--surface);padding:0.1rem 0.35rem;border-radius:4px;">python ingest.py</code> first; use <code style="background:var(--surface);padding:0.1rem 0.35rem;border-radius:4px;">--append</code> to add more runs without wiping the index.</p>
    <form id="f" action="#" method="get">
      <input type="search" id="q" name="q" placeholder="Try: docker, python, learning…" autocomplete="off" autofocus />
      <button type="submit">Search</button>
    </form>
    <div class="facets" id="facets" hidden>
      <div class="facet-row" id="facet-query-row" hidden>
        <span>Seed query</span>
        <div id="facet-queries"></div>
      </div>
      <div class="facet-row" id="facet-domain-row" hidden>
        <span>Domain</span>
        <div id="facet-domains"></div>
      </div>
    </div>
    <p class="meta" id="meta"></p>
    <div id="results"></div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    let filterSq = params.get("filter_sq") || "";
    let filterDom = params.get("filter_d") || "";

    (function initLegacyFilterBy() {
      var legacy = params.get("filter_by");
      if (!legacy || filterSq || filterDom) return;
      legacy.split(/\s*&&\s*/).forEach(function (part) {
        part = part.trim();
        if (part.indexOf("source_query:=`") === 0 && part.lastIndexOf("`") === part.length - 1) {
          filterSq = part.slice("source_query:=`".length, -1);
        }
        if (part.indexOf("domain:=`") === 0 && part.lastIndexOf("`") === part.length - 1) {
          filterDom = part.slice("domain:=`".length, -1);
        }
      });
    })();

    function buildFilterBy() {
      var parts = [];
      if (filterSq) parts.push("source_query:=`" + filterSq + "`");
      if (filterDom) parts.push("domain:=`" + filterDom + "`");
      return parts.join(" && ");
    }

    function wireFacetChips(container, onToggle) {
      container.querySelectorAll(".chip").forEach(function (btn) {
        btn.addEventListener("click", function () {
          onToggle(btn.getAttribute("data-v"));
          runSearch(document.getElementById("q").value);
        });
      });
    }

    /**
     * Copy for zero hits: distinguishes "nothing in the index" from "filters are too narrow".
     * When filters are active, `unfiltered` is the same q without filter_by (from a second request).
     */
    function renderZeroState(q, hasFilter, unfiltered) {
      var escQ = escapeHtml(q);
      var openHits = unfiltered.found ?? 0;
      var html = "<div class='empty' role='status'><strong>No results</strong> for <strong>" + escQ + "</strong>";
      if (hasFilter) {
        if (openHits > 0) {
          html += "<p class='hint'>Your seed query or domain filter excludes all " + openHits + " " +
            "matching document" + (openHits === 1 ? "" : "s") + " for this search. Clear a facet chip " +
            "below to broaden, or switch seed/domain.</p>";
        } else {
          html += "<p class='hint'>No documents in the index match this search, even with filters cleared. " +
            "Try different keywords or a shorter term.</p>";
        }
      } else {
        html += "<p class='hint'>Nothing in the index matches. Try different keywords or check spelling.</p>";
      }
      html += "</div>";
      return html;
    }

    async function runSearch(q) {
      const meta = document.getElementById("meta");
      const results = document.getElementById("results");
      if (!q.trim()) {
        meta.textContent = "";
        results.innerHTML = "";
        document.getElementById("facets").hidden = true;
        return;
      }
      meta.textContent = "Searching…";
      results.innerHTML = "";
      var url = "/api/search?q=" + encodeURIComponent(q);
      var fb = buildFilterBy();
      if (fb) url += "&filter_by=" + encodeURIComponent(fb);
      const res = await fetch(url);
      const data = await res.json();
      if (data.error) {
        meta.innerHTML = "<span class='err'>" + data.error + "</span>";
        return;
      }
      const found = data.found ?? 0;
      meta.textContent = found + " hit" + (found === 1 ? "" : "s");

      // If the user has facets selected but the intersection is empty, facet_counts on the
      // filtered response are often useless. Re-query without filter_by to drive chips + copy.
      var unfilteredForEmpty = data;
      if (found === 0 && fb) {
        const resOpen = await fetch("/api/search?q=" + encodeURIComponent(q));
        unfilteredForEmpty = await resOpen.json();
        if (unfilteredForEmpty.error) {
          unfilteredForEmpty = { found: 0, facet_counts: [] };
        }
      }

      if (found === 0) {
        results.innerHTML = renderZeroState(q, !!fb, unfilteredForEmpty);
      } else {
        const hits = data.hits || [];
        results.innerHTML = hits.map(function (h) {
          const d = h.document || {};
          const title = escapeHtml(d.title || d.url || "Untitled");
          const url = escapeHtml(d.url || "#");
          const sn = escapeHtml(d.snippet || "");
          const sq = escapeHtml(d.source_query || "");
          const dom = escapeHtml(d.domain || "");
          return "<div class='hit'><a href=\"" + url + "\" target=\"_blank\" rel=\"noopener\">" + title + "</a>" +
            (sn ? "<p class='snippet'>" + sn + "</p>" : "") +
            "<div class='tags'>" + dom + (sq ? " · seed: " + sq : "") + "</div></div>";
        }).join("");
      }

      // Facet chips: when the filtered search returned nothing, use unfiltered facet_counts
      // so the user can still change seed/domain without resetting the text query.
      var facetData = found === 0 && fb ? unfilteredForEmpty : data;
      const fc = facetData.facet_counts || [];
      const fqFacet = fc.find(function (f) { return f.field_name === "source_query"; });
      const domFacet = fc.find(function (f) { return f.field_name === "domain"; });
      const facetsEl = document.getElementById("facets");
      const fqDiv = document.getElementById("facet-queries");
      const domRow = document.getElementById("facet-domain-row");
      const domDiv = document.getElementById("facet-domains");

      var hasFq = fqFacet && fqFacet.counts && fqFacet.counts.length;
      var hasDom = domFacet && domFacet.counts && domFacet.counts.length;

      if (hasFq) {
        document.getElementById("facet-query-row").hidden = false;
        fqDiv.innerHTML = fqFacet.counts.map(function (c) {
          var active = filterSq === c.value;
          return "<button type='button' class='chip" + (active ? " active" : "") + "' data-v=\"" + escapeAttr(c.value) + "\">" +
            escapeHtml(c.value) + " <span style='opacity:0.7'>(" + c.count + ")</span></button>";
        }).join("");
        wireFacetChips(fqDiv, function (v) {
          filterSq = filterSq === v ? "" : v;
        });
      } else {
        document.getElementById("facet-query-row").hidden = true;
        fqDiv.innerHTML = "";
      }

      if (hasDom) {
        domRow.hidden = false;
        domDiv.innerHTML = domFacet.counts.map(function (c) {
          var active = filterDom === c.value;
          return "<button type='button' class='chip" + (active ? " active" : "") + "' data-v=\"" + escapeAttr(c.value) + "\">" +
            escapeHtml(c.value) + " <span style='opacity:0.7'>(" + c.count + ")</span></button>";
        }).join("");
        wireFacetChips(domDiv, function (v) {
          filterDom = filterDom === v ? "" : v;
        });
      } else {
        domRow.hidden = true;
        domDiv.innerHTML = "";
      }

      facetsEl.hidden = !(hasFq || hasDom);
    }

    function escapeHtml(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }
    function escapeAttr(s) {
      return s.replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;");
    }

    document.getElementById("f").addEventListener("submit", function (e) {
      e.preventDefault();
      const q = document.getElementById("q").value;
      runSearch(q);
    });

    const iq = params.get("q") || "";
    if (iq) {
      document.getElementById("q").value = iq;
      runSearch(iq);
    }
  </script>
</body>
</html>
